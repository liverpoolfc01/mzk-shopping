<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - MZK商城</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="admin-login-page">
    <div class="admin-login-box">
        <h2>🛒 MZK商城后台</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for cat, msg in messages %}
                    <div class="alert alert-{{ cat }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" placeholder="admin" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" placeholder="密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">登 录</button>
        </form>
        <p style="text-align:center;margin-top:16px;"><a href="/" style="color:var(--primary);">← 返回前台</a></p>
    </div>
</div>
</body>
</html>
