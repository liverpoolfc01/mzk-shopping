{% extends "base_admin.html" %}
{% block title %}{% if product %}编辑商品{% else %}添加商品{% endif %} - MZK商城后台{% endblock %}
{% block content %}
<h1 class="page-title">{% if product %}✏️ 编辑商品{% else %}➕ 添加商品{% endif %}</h1>
<div class="card"><div class="card-body">
<form method="POST" enctype="multipart/form-data" action="{% if product %}/admin/products/edit/{{ product.id }}{% else %}/admin/products/add{% endif %}">
    <div class="form-group"><label class="form-label">商品名称 *</label><input type="text" name="name" class="form-input" value="{{ product.name if product else '' }}" required></div>
    <div class="form-group"><label class="form-label">商品描述</label><textarea name="description" class="form-textarea">{{ product.description if product else '' }}</textarea></div>
    <div class="form-group"><label class="form-label">分类</label><select name="category_id" class="form-select">
        <option value="">无分类</option>
        {% for cat in categories %}<option value="{{ cat.id }}" {% if product and product.category_id==cat.id %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}
    </select></div>
    <div style="display:flex;gap:12px;">
        <div class="form-group" style="flex:1;"><label class="form-label">售价 *</label><input type="number" step="0.01" name="price" class="form-input" value="{{ product.price if product else '' }}" required></div>
        <div class="form-group" style="flex:1;"><label class="form-label">原价</label><input type="number" step="0.01" name="original_price" class="form-input" value="{{ product.original_price if product and product.original_price else '' }}"></div>
        <div class="form-group" style="flex:1;"><label class="form-label">库存 *</label><input type="number" name="stock" class="form-input" value="{{ product.stock if product else 0 }}" required></div>
    </div>
    <div class="form-group"><label class="form-label">商品图片 (1-3张)</label>
        <input type="file" name="image_1" class="form-input" accept="image/*" style="margin-bottom:4px;">
        <input type="file" name="image_2" class="form-input" accept="image/*" style="margin-bottom:4px;">
        <input type="file" name="image_3" class="form-input" accept="image/*">
    </div>
    <div class="form-group"><label><input type="checkbox" name="is_recommend" value="1" {% if product and product.is_recommend %}checked{% endif %}> 首页推荐</label></div>
    <button type="submit" class="btn btn-primary btn-lg">💾 保存</button>
    <a href="/admin/products" class="btn btn-outline" style="margin-left:8px;">取消</a>
</form>
</div></div>
{% endblock %}
