{% extends "base.html" %}
{% block title %}登录 - MZK商城{% endblock %}
{% block content %}
<div style="max-width:400px;margin:40px auto;padding:0 16px;">
    <div class="card"><div class="card-body">
        <h2 style="text-align:center;margin-bottom:20px;">🔑 用户登录</h2>
        <form method="POST" action="/auth/login">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" name="username" class="form-input" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" name="password" class="form-input" placeholder="请输入密码" required>
            </div>
            <div class="form-group">
                <label><input type="checkbox" name="remember"> 记住登录</label>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">登 录</button>
        </form>
        <p style="text-align:center;margin-top:16px;">
            还没有账号？<a href="/auth/register" style="color:var(--primary);">立即注册</a>
        </p>
    </div></div>
</div>
{% endblock %}
