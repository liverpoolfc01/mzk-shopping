{% extends "base.html" %}
{% block title %}商家入驻 - MZK商城{% endblock %}
{% block content %}
<div style="max-width:440px;margin:40px auto;padding:0 16px;">
    <div class="card"><div class="card-body">
        <h2 style="text-align:center;margin-bottom:4px;">🏪 商家入驻</h2>
        <p style="text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:20px;">免费开店，立即入驻</p>
        <form method="POST">
            <div class="form-group">
                <label class="form-label">商家用户名 <span style="color:var(--primary);">*</span></label>
                <input type="text" name="username" class="form-input" placeholder="3-50个字符" required>
            </div>
            <div class="form-group">
                <label class="form-label">手机号</label>
                <input type="text" name="phone" class="form-input" placeholder="联系手机号">
            </div>
            <div class="form-group">
                <label class="form-label">密码 <span style="color:var(--primary);">*</span></label>
                <input type="password" name="password" class="form-input" placeholder="至少6位" required>
            </div>
            <div class="form-group">
                <label class="form-label">确认密码 <span style="color:var(--primary);">*</span></label>
                <input type="password" name="password2" class="form-input" placeholder="再次输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">🏪 立即入驻</button>
        </form>
        <p style="text-align:center;margin-top:16px;">
            已有商家账号？<a href="/admin/login" style="color:var(--primary);">商家登录</a>
        </p>
        <p style="text-align:center;margin-top:4px;">
            <a href="/auth/login" style="color:var(--text-muted);font-size:13px;">← 返回用户登录</a>
        </p>
    </div></div>
</div>
{% endblock %}
